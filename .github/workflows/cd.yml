name: CD — Deploy AgentOS

on:
  push:
    branches:
      - main
    paths:
      - "go-service/**"
      - "python-service/**"
      - "web/**"
      - "docker-compose.yml"
      - "docker/**"
      - ".github/workflows/cd.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: "staging"
        options:
          - staging
          - production

concurrency:
  group: agentos-cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  GO_IMAGE: ghcr.io/rayyen0902/agentos-go-service
  PYTHON_IMAGE: ghcr.io/rayyen0902/agentos-python-service

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      # ── Step 1: Checkout ────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Login to GHCR ──────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 3: Build & push Docker images ─────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push go-service
        uses: docker/build-push-action@v5
        with:
          context: ./go-service
          push: true
          tags: ${{ env.GO_IMAGE }}:latest,${{ env.GO_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push python-service
        uses: docker/build-push-action@v5
        with:
          context: ./python-service
          push: true
          tags: ${{ env.PYTHON_IMAGE }}:latest,${{ env.PYTHON_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 4: Build React frontend ──────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web frontend
        working-directory: ./web
        run: |
          npm ci
          npm run build

      # ── Step 5: Install sshpass ───────────────────────────
      - name: Install sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

      # ── Step 6: SCP artifacts to server ───────────────────
      - name: Create remote directories
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "mkdir -p /opt/agentos/{web/dist,nginx,docker}"

      - name: SCP docker-compose.yml
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no \
              docker-compose.yml \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/agentos/

      - name: SCP web dist
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -r \
              web/dist/ \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/agentos/web/dist/

      - name: SCP nginx config
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -r \
              nginx/ \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/agentos/nginx/

      - name: SCP docker init scripts
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            scp -o StrictHostKeyChecking=no -r \
              docker/ \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/agentos/docker/

      # ── Step 7: Pull images & restart on server ───────────
      - name: Pull images and restart services
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "set -e;
               cd /opt/agentos;
               echo '=== Logging into GHCR ===';
               echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin;
               echo '=== Pulling latest images ===';
               docker compose --profile full pull;
               echo '=== Restarting services ===';
               docker compose --profile full down || true;
               docker compose --profile full up -d;
               echo '=== Waiting for startup ===';
               sleep 15;
               echo '=== Health check ===';
               curl -sf -o /dev/null -w '%{http_code}' http://localhost:8080/health && echo ' OK' || echo ' FAILED'"

      # ── Step 8: Final health check ───────────────────────
      - name: Final health check
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "echo '=== Container status ===';
               docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep agentos || echo 'No agentos containers';
               echo '';
               curl -sf http://localhost:8080/health | python3 -m json.tool || echo 'Health check FAILED'"

      # ── Step 9: Failure notification ─────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "==========================================="
          echo "  DEPLOY FAILED"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Commit: ${{ github.sha }}"
          echo "  Run:    ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "==========================================="
