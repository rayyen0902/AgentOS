version: "3.9"

name: agentos

services:
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-agentos}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-agentos123}
      POSTGRES_DB: ${PG_DB:-agentos}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-agentos} -d ${PG_DB:-agentos}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  python-service:
    profiles: ["full"]
    image: ghcr.io/rayyen0902/agentos-python-service:latest
    ports:
      - "8001:8000"
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  go-service:
    profiles: ["full"]
    image: ghcr.io/rayyen0902/agentos-go-service:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
      - go-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-service:
        condition: service_healthy

  nginx:
    profiles: ["full"]
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - go-service

volumes:
  pgdata:
